version: "3.9"

services:

  # ── PostgreSQL para Meeting Intelligence Agent ────────────────────────────
  # Puerto 5433 para no colisionar con el Document Intelligence Agent (5432)
  meeting_intel_db:
    image: pgvector/pgvector:pg16
    container_name: meeting_intel_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - meeting_intel_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  meeting_intel_pgdata:
